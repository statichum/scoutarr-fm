services:
  scoutarr:
    build: .
    container_name: scoutarr-fm
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./config/:/config/
    restart: unless-stopped
    ports:
      - "8787:8787"   # webhook listener
    environment:
      - TZ=Pacific/Auckland
